openapi: 3.1.0
info:
  title: Triforce Healthcare Agent API
  description: >
    Clinical NLP agent for medical document classification, entity extraction,
    and patient record summarization. Runs inference on Intel Xeon 6 via MAAS/LiteLLM.
  version: 0.1.0
  contact:
    name: Jonathan Kershaw
    email: jkershaw@redhat.com
  license:
    name: Apache-2.0

servers:
  - url: http://localhost:8081
    description: Local development

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Service health check
      tags: [infrastructure]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /a2a:
    post:
      operationId: a2aTaskSend
      summary: A2A JSON-RPC endpoint for agent-to-agent communication
      tags: [a2a]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JsonRpcRequest"
      responses:
        "200":
          description: A2A task response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcResponse"

  /.well-known/agent-card.json:
    get:
      operationId: getAgentCard
      summary: A2A agent discovery endpoint
      tags: [a2a]
      responses:
        "200":
          description: Agent card metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentCard"

  /api/v1/classify:
    post:
      operationId: classifyDocument
      summary: Classify a clinical document by type
      tags: [clinical-nlp]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassifyRequest"
      responses:
        "200":
          description: Classification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassifyResponse"

  /api/v1/extract-entities:
    post:
      operationId: extractEntities
      summary: Extract medical entities (NER) from clinical text
      tags: [clinical-nlp]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractEntitiesRequest"
      responses:
        "200":
          description: Extracted entities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractEntitiesResponse"

  /api/v1/summarize:
    post:
      operationId: summarizeRecord
      summary: Generate a patient record summary
      tags: [clinical-nlp]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SummarizeRequest"
      responses:
        "200":
          description: Summary result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummarizeResponse"

  /api/v1/speculative/status:
    get:
      operationId: getSpeculativeStatus
      summary: Return speculative decoding configuration
      tags: [optimization]
      responses:
        "200":
          description: Speculative decoding configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeculativeStatusResponse"

  /api/v1/speculative/run:
    post:
      operationId: runSpeculativeMeasurement
      summary: Measure target baseline versus speculative decoding
      tags: [optimization]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpeculativeRunRequest"
      responses:
        "200":
          description: Baseline and speculative model measurement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeculativeRunResponse"

components:
  schemas:
    HealthResponse:
      type: object
      required: [status, service, version]
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        service:
          type: string
          const: healthcare-agent
        version:
          type: string
        dependencies:
          type: object
          properties:
            postgres:
              type: string
              enum: [up, down]
            kafka:
              type: string
              enum: [up, down]
            litellm:
              type: string
              enum: [up, down]

    ClassifyRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 50000
        document_type_hint:
          type: string
          description: Optional hint for expected document type

    ClassifyResponse:
      type: object
      required: [classification, confidence, model, inference_ms]
      properties:
        classification:
          type: string
          enum:
            - discharge_summary
            - progress_note
            - lab_report
            - radiology_report
            - pathology_report
            - surgical_note
            - consultation
            - prescription
            - unknown
        confidence:
          type: number
          minimum: 0
          maximum: 1
        model:
          type: string
        accelerator:
          type: string
          enum: [cpu, gpu]
          default: cpu
        inference_ms:
          type: integer
          minimum: 0

    ExtractEntitiesRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 50000
        entity_types:
          type: array
          items:
            type: string
            enum: [condition, medication, procedure, lab_test, anatomy, dosage]
          description: Filter to specific entity types (default all)

    ExtractEntitiesResponse:
      type: object
      required: [entities, model, inference_ms]
      properties:
        entities:
          type: array
          items:
            $ref: "#/components/schemas/MedicalEntity"
        model:
          type: string
        accelerator:
          type: string
          enum: [cpu, gpu]
          default: cpu
        inference_ms:
          type: integer
          minimum: 0

    MedicalEntity:
      type: object
      required: [text, type, start, end]
      properties:
        text:
          type: string
        type:
          type: string
          enum: [condition, medication, procedure, lab_test, anatomy, dosage]
        start:
          type: integer
          minimum: 0
        end:
          type: integer
          minimum: 0
        icd10_code:
          type: string
          description: ICD-10 code if applicable
        confidence:
          type: number
          minimum: 0
          maximum: 1

    SummarizeRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 100000
        max_length:
          type: integer
          minimum: 50
          maximum: 2000
          default: 500

    SummarizeResponse:
      type: object
      required: [summary, model, inference_ms]
      properties:
        summary:
          type: string
        key_findings:
          type: array
          items:
            type: string
        model:
          type: string
        accelerator:
          type: string
          enum: [cpu, gpu]
          default: cpu
        inference_ms:
          type: integer
          minimum: 0
        input_tokens:
          type: integer
        output_tokens:
          type: integer

    SpeculativeStatusResponse:
      type: object
      required:
        - enabled
        - baseline_model
        - target_model
        - draft_model
        - speculative_model
        - api_base_configured
        - mode
        - num_speculative_tokens
        - claim_threshold
      properties:
        enabled:
          type: boolean
        baseline_model:
          type: string
        target_model:
          type: string
        draft_model:
          type: string
        speculative_model:
          type: string
        api_base_configured:
          type: boolean
        mode:
          type: string
        num_speculative_tokens:
          type: integer
          minimum: 1
        claim_threshold:
          type: number
          minimum: 1

    SpeculativeRunRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 100000
        task:
          type: string
          default: summarization
        max_tokens:
          type: integer
          minimum: 1
          maximum: 2000

    SpeculativeModelResult:
      type: object
      required: [model, task, latency_ms]
      properties:
        model:
          type: string
        task:
          type: string
        latency_ms:
          type: integer
          minimum: 0
        output:
          type: string
        prompt_tokens:
          type: integer
          minimum: 0
        output_tokens:
          type: integer
          minimum: 0
        error:
          type: string

    SpeculativeRunResponse:
      type: object
      required: [status, task, baseline, speculative, message]
      properties:
        status:
          type: string
          enum: [complete, error]
        task:
          type: string
        baseline:
          $ref: "#/components/schemas/SpeculativeModelResult"
        speculative:
          $ref: "#/components/schemas/SpeculativeModelResult"
        speedup:
          type:
            - number
            - "null"
        claim_threshold:
          type: number
          minimum: 1
        message:
          type: string

    # A2A Protocol schemas
    AgentCard:
      type: object
      required: [name, description, version, url, capabilities, skills, protocolVersion]
      properties:
        name:
          type: string
          const: Healthcare Agent
        description:
          type: string
        version:
          type: string
        url:
          type: string
          format: uri
        protocolVersion:
          type: string
        capabilities:
          type: object
          properties:
            streaming:
              type: boolean
            pushNotifications:
              type: boolean
            stateTransitionHistory:
              type: boolean
        defaultInputModes:
          type: array
          items:
            type: string
        defaultOutputModes:
          type: array
          items:
            type: string
        skills:
          type: array
          items:
            $ref: "#/components/schemas/AgentSkill"

    AgentSkill:
      type: object
      required: [id, name, description]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        examples:
          type: array
          items:
            type: string

    JsonRpcRequest:
      type: object
      required: [jsonrpc, id, method, params]
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
        method:
          type: string
          enum: [tasks/send, tasks/get, tasks/cancel]
        params:
          type: object
          required: [id, message]
          properties:
            id:
              type: string
            message:
              type: object
              required: [messageId, kind, role, parts]
              properties:
                messageId:
                  type: string
                kind:
                  type: string
                  const: message
                role:
                  type: string
                  enum: [user, agent]
                parts:
                  type: array
                  items:
                    type: object
                    required: [kind, text]
                    properties:
                      kind:
                        type: string
                        const: text
                      text:
                        type: string

    JsonRpcResponse:
      type: object
      required: [jsonrpc, id, result]
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
        result:
          type: object
          required: [id, status, kind]
          properties:
            id:
              type: string
            contextId:
              type: string
            status:
              type: object
              required: [state]
              properties:
                state:
                  type: string
                  enum: [pending, running, completed, failed]
                timestamp:
                  type: string
                  format: date-time
            artifacts:
              type: array
              items:
                type: object
                properties:
                  artifactId:
                    type: string
                  parts:
                    type: array
                    items:
                      type: object
                      properties:
                        kind:
                          type: string
                        text:
                          type: string
            kind:
              type: string
              const: task

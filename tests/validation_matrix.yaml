stages:
  stage_0_contracts:
    description: "All API contracts defined and parseable"
    threshold: 100
    criteria:
      openapi_healthcare_valid:
        description: "Healthcare agent OpenAPI spec validates against 3.1"
        points: 10
        required: true
      openapi_finserv_valid:
        description: "FinServ agent OpenAPI spec validates against 3.1"
        points: 10
        required: true
      openapi_orchestrator_valid:
        description: "Orchestrator OpenAPI spec validates against 3.1"
        points: 10
        required: true
      openapi_a2a_valid:
        description: "A2A protocol OpenAPI spec validates against 3.1"
        points: 10
        required: true
      asyncapi_healthcare_valid:
        description: "Healthcare AsyncAPI spec validates against 3.0"
        points: 10
        required: true
      asyncapi_finserv_valid:
        description: "FinServ AsyncAPI spec validates against 3.0"
        points: 10
        required: true
      asyncapi_orchestrator_valid:
        description: "Orchestrator AsyncAPI spec validates against 3.0"
        points: 10
        required: true
      mcp_fhir_tools_valid:
        description: "FHIR MCP tool schemas validate"
        points: 10
        required: true
      mcp_risk_tools_valid:
        description: "Risk MCP tool schemas validate"
        points: 10
        required: true
      mcp_platform_tools_valid:
        description: "Platform MCP tool schemas validate"
        points: 10
        required: true

  stage_1_infrastructure:
    description: "All containers build and services start"
    threshold: 90
    criteria:
      healthcare_container_builds:
        description: "Python healthcare agent container builds successfully"
        points: 15
        required: true
      finserv_container_builds:
        description: "Quarkus finserv agent container builds successfully"
        points: 15
        required: true
      orchestrator_container_builds:
        description: "Go orchestrator container builds successfully"
        points: 15
        required: true
      compose_stack_starts:
        description: "Full docker-compose stack starts with all health checks passing"
        points: 15
        required: true
      postgres_migrations_apply:
        description: "PostgreSQL migrations apply cleanly and schema is correct"
        points: 10
        required: true
      kafka_topics_created:
        description: "All Kafka topics created with correct configuration"
        points: 10
        required: true
      mcp_tool_fallbacks:
        description: "MCP tools return valid data when gateway unavailable"
        points: 10
        required: false

  stage_2_unit:
    description: "Per-service business logic passes"
    threshold: 90
    criteria:
      healthcare_classify:
        description: "Clinical document classification returns valid categories"
        points: 15
        required: true
      healthcare_ner:
        description: "Medical NER extracts entities with correct types"
        points: 15
        required: true
      healthcare_summarize:
        description: "Patient record summarization produces coherent output"
        points: 10
        required: true
      finserv_fraud_score:
        description: "Fraud scoring returns valid risk levels and signals"
        points: 15
        required: true
      finserv_compliance:
        description: "Compliance checking evaluates regulatory rules correctly"
        points: 15
        required: true
      finserv_risk_assess:
        description: "Risk assessment aggregates factors into valid scores"
        points: 10
        required: true
      orchestrator_workflow:
        description: "Workflow engine coordinates multi-step task sequences"
        points: 15
        required: true
      orchestrator_discovery:
        description: "Agent discovery fetches and parses A2A agent cards"
        points: 15
        required: true
      semantic_router_classifies:
        description: "Semantic Router classifies simple vs complex requests"
        points: 15
        required: true
      semantic_router_returns_model:
        description: "Router returns recommended model per complexity tier"
        points: 10
        required: true
      semantic_router_latency:
        description: "Router classification completes in under 50ms (no LLM call)"
        points: 10
        required: false

  stage_3_contracts_compliance:
    description: "Services comply with their defined contracts"
    threshold: 90
    criteria:
      healthcare_openapi_compliance:
        description: "Healthcare agent responses match OpenAPI schema exactly"
        points: 15
        required: true
      finserv_openapi_compliance:
        description: "FinServ agent responses match OpenAPI schema exactly"
        points: 15
        required: true
      orchestrator_openapi_compliance:
        description: "Orchestrator responses match OpenAPI schema exactly"
        points: 15
        required: true
      kafka_schema_compliance:
        description: "All Kafka messages match their AsyncAPI schemas"
        points: 15
        required: true
      a2a_protocol_compliance:
        description: "All agents respond correctly to A2A JSON-RPC calls"
        points: 15
        required: true
      mcp_tool_compliance:
        description: "MCP tool responses match declared output schemas"
        points: 10
        required: false
      agent_card_compliance:
        description: "Agent cards include all required A2A fields"
        points: 15
        required: true

  stage_4_integration:
    description: "Cross-service communication works end-to-end"
    threshold: 85
    criteria:
      a2a_agent_discovery:
        description: "Orchestrator discovers healthcare and finserv agents via A2A protocol"
        points: 15
        required: true
      kafka_healthcare_flow:
        description: "Synthetic patient → healthcare agent → analysis result via Kafka"
        points: 15
        required: true
      kafka_finserv_flow:
        description: "Synthetic transaction → finserv agent → fraud score via Kafka"
        points: 15
        required: true
      multi_agent_workflow:
        description: "Orchestrator coordinates a workflow touching both agents"
        points: 20
        required: true
      postgres_shared_state:
        description: "Agents read/write shared state via PostgreSQL"
        points: 10
        required: false
      vllm_sr_routing:
        description: "vLLM Semantic Router classifies requests to correct agent"
        points: 10
        required: false
      kv_cache_metrics:
        description: "KV cache hit rate tracked in inference log"
        points: 10
        required: false

  stage_5_scale:
    description: "System handles synthetic load at scale"
    threshold: 80
    criteria:
      kafka_throughput:
        description: "Kafka pipeline sustains 100+ events/sec through full flow"
        points: 15
        required: false
      concurrent_agents:
        description: "Multiple agent replicas handle concurrent requests correctly"
        points: 15
        required: false
      xeon_inference_latency:
        description: "Xeon 6 CPU inference p95 latency < 2s for classification tasks"
        points: 20
        required: true
      synthetic_healthcare_batch:
        description: "Process 1000 synthetic patient records end-to-end"
        points: 15
        required: false
      synthetic_finserv_batch:
        description: "Process 1000 synthetic transactions end-to-end"
        points: 15
        required: false
      cost_savings_report:
        description: "Platform generates accurate CPU vs GPU cost comparison report"
        points: 10
        required: false
      kv_cache_benefit:
        description: "KV cache demonstrates measurable latency reduction on repeat patterns"
        points: 10
        required: false

  stage_6_frontend_accuracy:
    description: "All displayed numbers come from live API calls, not hardcoded values"
    threshold: 80
    criteria:
      act02_pipeline_live:
        description: "Act 02 pipeline latency comes from real /api/v1/pipeline response"
        points: 20
        required: true
      act05_pipeline_visual_live:
        description: "Act 05 pipeline visual shows latency from Act 02 run via DemoContext"
        points: 15
        required: true
      act05_mcp_vs_llm_live:
        description: "Act 05 MCP vs LLM comparison shows real interaction check + NER latency"
        points: 15
        required: true
      act06_punchline_live:
        description: "Act 06 punchline table shows per-node latency from Act 02 run"
        points: 20
        required: true
      act02_fraud_live:
        description: "Act 02 fraud scoring shows real risk level, score, and signals"
        points: 15
        required: true
      secure_act05_numbers:
        description: "Secure Act 05 tradeoff numbers are marked as projected until TDX is live"
        points: 10
        required: false
      no_hardcoded_latency:
        description: "No hardcoded ms/s values displayed as if they were live measurements"
        points: 15
        required: true

  stage_7_multinode:
    description: "Horizontal scaling proves throughput without latency regression"
    threshold: 80
    criteria:
      baseline_1_replica_10:
        description: "1 replica handles 10 concurrent pipeline requests, records avg latency + throughput"
        points: 15
        required: true
      baseline_1_replica_30:
        description: "1 replica handles 30 concurrent requests, latency climbs under contention"
        points: 15
        required: true
      scaled_3_replicas_10:
        description: "3 replicas handle 10 concurrent requests, latency stays flat vs baseline"
        points: 15
        required: true
      scaled_3_replicas_30:
        description: "3 replicas handle 30 concurrent requests, latency stays within 20% of 10-req baseline"
        points: 20
        required: true
      throughput_scales:
        description: "3 replicas achieve >= 2.5x throughput of 1 replica at 30 concurrent"
        points: 20
        required: true
      cost_stays_zero:
        description: "All inference calls report $0 cost regardless of replica count"
        points: 15
        required: true

  stage_8_modules:
    description: "Pluggable modules validate independently and compose correctly"
    threshold: 90
    criteria:
      module_manifests_valid:
        description: "All module.yaml manifests parse and contain required fields (name, helm.flag, dependencies)"
        points: 10
        required: true
      module_helm_flags_default_false:
        description: "All module Helm flags default to false in values.yaml"
        points: 10
        required: true
      module_helm_template_renders:
        description: "Helm chart renders cleanly with any combination of modules enabled"
        points: 15
        required: true
      module_env_vars_injected:
        description: "Enabling a module injects correct env vars into agent deployment"
        points: 10
        required: true
      module_content_exists:
        description: "Each module has a showroom explore page in content/modules/ROOT/pages/"
        points: 10
        required: true
      adaptive_cache_functional:
        description: "Adaptive classification cache returns hit on repeated text within same session"
        points: 15
        required: true
      modules_compose_no_conflict:
        description: "Enabling all modules simultaneously produces no Helm or runtime errors"
        points: 15
        required: true
      module_disabled_no_side_effects:
        description: "Disabled modules produce zero env vars, zero additional pods, zero errors"
        points: 15
        required: true

  stage_9_benchmarks:
    description: "Model benchmarks produce valid, reproducible metrics across tasks and hardware"
    threshold: 80
    criteria:
      benchmark_models_endpoint:
        description: "GET /api/v1/benchmark/models returns all available CPU and GPU models"
        points: 10
        required: true
      benchmark_run_classification:
        description: "Benchmark runner produces valid latency + correctness for classification task"
        points: 15
        required: true
      benchmark_run_ner:
        description: "Benchmark runner produces valid latency + entity count for NER task"
        points: 15
        required: true
      benchmark_run_summarization:
        description: "Benchmark runner produces valid latency + token count for summarization task"
        points: 15
        required: true
      benchmark_cpu_vs_gpu:
        description: "Same model on CPU vs GPU shows measurable latency difference"
        points: 15
        required: true
      benchmark_results_logged:
        description: "Benchmark results are persisted to PostgreSQL for historical comparison"
        points: 10
        required: false
      guidellm_sweep_completes:
        description: "guidellm throughput sweep runs against MAAS and produces valid report"
        points: 10
        required: false
      benchmark_reproducible:
        description: "Running same benchmark twice produces latency within 20% variance"
        points: 10
        required: false

  stage_10_workflows:
    description: "End-to-end workflows validate across all active modules"
    threshold: 85
    criteria:
      workflow_cpu_only_pipeline:
        description: "Full healthcare pipeline completes on CPU-only models with real provenance"
        points: 15
        required: true
      workflow_fraud_scoring_e2e:
        description: "Fraud scoring returns rule_score + llm_score + real model + real latency"
        points: 15
        required: true
      workflow_a2a_discovery_both:
        description: "Orchestrator discovers both healthcare and finserv agents via A2A"
        points: 10
        required: true
      workflow_heterogeneous_routing:
        description: "When heterogeneous module enabled, simple→CPU and complex→GPU routing verified"
        points: 15
        required: false
      workflow_fusion_panel:
        description: "When fusion module enabled, 3 models respond + judge synthesizes consensus"
        points: 15
        required: false
      workflow_speculative_speedup:
        description: "When speculative module enabled, draft+target shows measurable speedup vs target-only"
        points: 15
        required: false
      workflow_adaptive_learning:
        description: "Adaptive cache hit rate increases after processing 10+ records"
        points: 10
        required: true
      workflow_all_modules_combined:
        description: "Enable all modules, run full pipeline, all metrics reported correctly"
        points: 20
        required: false

          test_text: "72-year-old male admitted with acute chest pain. History of Type 2 Diabetes, hypertension, CKD stage 3. ECG showed ST elevation. Troponin I elevated at 8.2. Emergent catheterization revealed 95% occlusion of RCA. Successful PCI with drug-eluting stent."

      optimization_story:
        description: "Before/after comparisons — the engineering payoff on Xeon 6767P"
        comparisons:
          - name: int8_quantization
            before: { model: granite-2b-cpu, hardware: cpu-xeon6767p }
            after: { model: granite-2b-int8, hardware: cpu-xeon6767p-amx }
            expected_speedup: 1.5
            quality_threshold: "same classification output"
          - name: next_gen_granite
            before: { model: granite-3-2-8b-instruct-cpu, hardware: cpu-xeon6767p }
            after: { model: granite-4.1-8b, hardware: cpu-xeon6767p }
            expected_quality: "equal or better"
            notes: "4.1 matches 4.0-H-Small (32B MoE) with 8B dense"
          - name: ultrafast_router
            before: { model: qwen25-3b-cpu, task: classification }
            after: { model: granite-350m, task: classification }
            expected_speedup: 3.0
            notes: "350M for router pre-classification"
          - name: model_ladder
            models: [granite-350m, granite-4-0-h-tiny-cpu, granite-2b-cpu, qwen25-3b-cpu, phi3-mini-cpu, granite-3-2-8b-instruct-cpu]
            task: classification
            notes: "Full latency ladder from 350M to 8B on same hardware"

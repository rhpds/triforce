name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: "Stage 0: Contract Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest pyyaml
      - run: python -m pytest tests/contracts/ -v --tb=short

  healthcare-agent:
    name: "Healthcare Agent (Python)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r services/healthcare-agent/requirements.txt
      - run: pip install pytest pytest-asyncio
      - run: |
          cd services/healthcare-agent
          python -m pytest tests/ -v --tb=short

  finserv-agent-java:
    name: "FinServ Agent (Java/Quarkus)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: |
          cd services/finserv-agent
          mvn test -q

  finserv-agent-langgraph:
    name: "FinServ Agent (LangGraph)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install langgraph langchain-core langchain-openai httpx pytest pytest-asyncio
      - run: |
          cd services/finserv-agent/langgraph
          python -m pytest tests/ -v --tb=short

  orchestrator:
    name: "Orchestrator (Go)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          cd services/orchestrator
          go test ./... -v

  frontend:
    name: "Frontend (Vitest)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: |
          cd frontend
          npm ci
          npx vitest run

  helm-lint:
    name: "Helm Chart Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: |
          helm lint infrastructure/helm/ \
            --set litellm.apiBase=https://test.example.com \
            --set litellm.apiKey=test \
            --set postgres.password=test

# LiteLLM Proxy — aggregates 9 OVMS models behind single OpenAI-compatible API
# Triforce services point LITELLM_API_BASE here instead of MAAS
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: triforce
data:
  config.yaml: |
    model_list:
      - model_name: granite-350m
        litellm_params:
          model: openai/granite-350m
          api_base: http://ovms-granite-350m.triforce.svc:8080/v3
          api_key: unused
      - model_name: granite-4-0-h-tiny-cpu
        litellm_params:
          model: openai/granite-4-0-h-tiny-cpu
          api_base: http://ovms-granite-1b.triforce.svc:8080/v3
          api_key: unused
      - model_name: granite-2b-cpu
        litellm_params:
          model: openai/granite-2b-cpu
          api_base: http://ovms-granite-2b.triforce.svc:8080/v3
          api_key: unused
      - model_name: granite-2b-int8
        litellm_params:
          model: openai/granite-2b-int8
          api_base: http://ovms-granite-2b-int8.triforce.svc:8080/v3
          api_key: unused
      - model_name: qwen25-3b-cpu
        litellm_params:
          model: openai/qwen25-3b-cpu
          api_base: http://ovms-qwen25-3b.triforce.svc:8080/v3
          api_key: unused
      - model_name: granite-4.1-3b
        litellm_params:
          model: openai/granite-4.1-3b
          api_base: http://ovms-granite41-3b.triforce.svc:8080/v3
          api_key: unused
      - model_name: phi3-mini-cpu
        litellm_params:
          model: openai/phi3-mini-cpu
          api_base: http://ovms-phi3-mini.triforce.svc:8080/v3
          api_key: unused
      - model_name: granite-3-2-8b-instruct-cpu
        litellm_params:
          model: openai/granite-3-2-8b-instruct-cpu
          api_base: http://ovms-granite-8b.triforce.svc:8080/v3
          api_key: unused
      - model_name: granite-4.1-8b
        litellm_params:
          model: openai/granite-4.1-8b
          api_base: http://ovms-granite41-8b.triforce.svc:8080/v3
          api_key: unused
    general_settings:
      master_key: local-oberon-key
      drop_params: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: triforce
  labels:
    app: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          args:
            - --config
            - /etc/litellm/config.yaml
            - --port
            - "4000"
          ports:
            - containerPort: 4000
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
          readinessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: triforce
spec:
  selector:
    app: litellm
  ports:
    - port: 4000
      targetPort: 4000

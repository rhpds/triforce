# OpenVINO Model Server — 9 models on Xeon 6767P
# INT4 quantized via optimum-intel, served with continuous batching
# OpenAI-compatible /v3/chat/completions endpoint

# =============================================================================
# 1. granite-350m (350M INT4) — Ultra-fast classification
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ovms-granite-350m
  namespace: triforce
  labels:
    app: ovms-granite-350m
    triforce.io/role: model-serving
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ovms-granite-350m
  template:
    metadata:
      labels:
        app: ovms-granite-350m
        triforce.io/role: model-serving
    spec:
      containers:
        - name: ovms
          image: openvino/model_server:latest
          args:
            - --model_name
            - granite-350m
            - --model_path
            - /models/ov/granite-350m
            - --rest_port
            - "8080"
          ports:
            - containerPort: 8080
              name: rest
          resources:
            requests:
              cpu: "4"
              memory: 2Gi
            limits:
              cpu: "16"
              memory: 4Gi
          volumeMounts:
            - name: models
              mountPath: /models
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: huggingface-model-cache
---
apiVersion: v1
kind: Service
metadata:
  name: ovms-granite-350m
  namespace: triforce
spec:
  selector:
    app: ovms-granite-350m
  ports:
    - port: 8080
      targetPort: 8080


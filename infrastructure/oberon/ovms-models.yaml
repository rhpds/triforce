    matchLabels:
      app: ovms-phi3-mini
  template:
    metadata:
      labels:
        app: ovms-phi3-mini
        triforce.io/role: model-serving
    spec:
      containers:
        - name: ovms
          image: openvino/model_server:latest
          args:
            - --model_repository_path
            - /models/ovms-repo
            - --source_model
            - OpenVINO/Phi-3-mini-4k-instruct-int4-ov
            - --model_name
            - phi3-mini-cpu
            - --task
            - text_generation
            - --target_device
            - CPU
            - --rest_port
            - "8080"
          ports:
            - containerPort: 8080

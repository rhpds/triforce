              memory: 16Gi
          volumeMounts:
            - name: models
              mountPath: /models
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8080
            initialDelaySeconds: 300
            periodSeconds: 30
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: huggingface-model-cache
---
apiVersion: v1

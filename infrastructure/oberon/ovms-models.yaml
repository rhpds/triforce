# =============================================================================
# 7. phi3-mini (3.8B INT4) — Complex reasoning (pre-converted on HF)
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ovms-phi3-mini
  namespace: triforce
  labels:
    app: ovms-phi3-mini
    triforce.io/role: model-serving
spec:
  replicas: 1

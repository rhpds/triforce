---
# Secrets available to attested pods via Trustee KBS
# These are released ONLY to pods that pass TDX attestation
apiVersion: v1
kind: Secret
metadata:
  name: kbs-secrets
  namespace: trustee-operator-system
type: Opaque
stringData:
  # LiteLLM API key — released only to TDX-attested pods
  litellm-api-key: ""  # Fill at deploy time

  # Additional secrets can be added here
  # postgres-password: ""
  # mcp-gateway-token: ""

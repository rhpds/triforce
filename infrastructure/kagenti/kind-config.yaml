kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: triforce
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30081
        hostPort: 8081
        protocol: TCP
      - containerPort: 30082
        hostPort: 8082
        protocol: TCP
      - containerPort: 30083
        hostPort: 8083
        protocol: TCP
      - containerPort: 30090
        hostPort: 8090
        protocol: TCP
  - role: worker
  - role: worker

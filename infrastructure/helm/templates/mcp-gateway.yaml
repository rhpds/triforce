{{- if .Values.mcpGateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: mcp-gateway
    app.kubernetes.io/part-of: triforce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-gateway
  template:
    metadata:
      labels:
        app: mcp-gateway
    spec:
      containers:
        - name: gateway
          image: {{ .Values.mcpGateway.image }}
          ports:
            - containerPort: 8091
              name: http
          resources:
            {{- toYaml .Values.mcpGateway.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-gateway
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: mcp-gateway
  ports:
    - port: 8091
      targetPort: 8091
      name: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: mcp-gateway
  namespace: {{ .Release.Namespace }}
  annotations:
    haproxy.router.openshift.io/timeout: "120s"
spec:
  to:
    kind: Service
    name: mcp-gateway
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}

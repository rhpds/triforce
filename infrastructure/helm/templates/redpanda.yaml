{{- if .Values.kafka.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
  namespace: {{ .Values.namespace }}
  labels:
    app: redpanda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
        - name: redpanda
          image: {{ .Values.kafka.image }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              cat > /tmp/redpanda.yaml << 'EOF'
              redpanda:
                data_directory: /var/lib/redpanda/data
                seed_servers: []
                rpc_server:
                  address: "0.0.0.0"
                  port: 33145
                advertised_rpc_api:
                  address: "redpanda.{{ .Values.namespace }}.svc.cluster.local"
                  port: 33145
                kafka_api:
                  - address: "0.0.0.0"
                    port: 9092
                advertised_kafka_api:
                  - address: "redpanda.{{ .Values.namespace }}.svc.cluster.local"
                    port: 9092
                admin:
                  address: "0.0.0.0"
                  port: 9644
                developer_mode: true
              EOF
              exec redpanda --redpanda-cfg /tmp/redpanda.yaml --smp 1 --memory 256M --default-log-level=warn
          ports:
            - containerPort: 9092
              name: kafka
          resources:
            {{- toYaml .Values.kafka.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["rpk", "cluster", "health"]
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: redpanda
  ports:
    - port: 9092
      targetPort: 9092
      name: kafka
{{- end }}

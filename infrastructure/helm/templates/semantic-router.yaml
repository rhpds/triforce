{{- if .Values.semanticRouter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: semantic-router
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: semantic-router
    app.kubernetes.io/part-of: triforce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: semantic-router
  template:
    metadata:
      labels:
        app: semantic-router
    spec:
      {{- if .Values.confidential.enabled }}
      runtimeClassName: {{ .Values.confidential.runtimeClassName }}
      {{- end }}
      containers:
        - name: router
          image: {{ .Values.semanticRouter.image }}
          ports:
            - containerPort: 8094
              name: http
          env:
            - name: SEMANTIC_ROUTER_PORT
              value: "8094"
            - name: ROUTES_CONFIG
              value: "/app/config/routes.yaml"
            - name: COMPLEX_MODEL
              value: {{ .Values.semanticRouter.complexModel | default "qwen25-3b-cpu" }}
            {{- if .Values.modules.heterogeneous.enabled }}
            - name: HETEROGENEOUS_ROUTING
              value: "true"
            - name: GPU_COMPLEX_MODEL
              value: {{ .Values.modules.heterogeneous.gpuModel | default .Values.semanticRouter.gpuComplexModel | default "granite-4.1-8b" | quote }}
            {{- end }}
          volumeMounts:
            - name: router-config
              mountPath: /app/config
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8094
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8094
            initialDelaySeconds: 180
            periodSeconds: 30
      volumes:
        - name: router-config
          configMap:
            name: semantic-router-config
---
apiVersion: v1
kind: Service
metadata:
  name: semantic-router
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: semantic-router
  ports:
    - port: 8094
      targetPort: 8094
      name: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: semantic-router
  namespace: {{ .Release.Namespace }}
  annotations:
    haproxy.router.openshift.io/timeout: "120s"
spec:
  to:
    kind: Service
    name: semantic-router
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}

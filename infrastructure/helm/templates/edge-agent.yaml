{{- if .Values.modules.edge.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-agent
  namespace: {{ .Values.namespace }}
  labels:
    app: edge-agent
    app.kubernetes.io/part-of: triforce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edge-agent
  template:
    metadata:
      labels:
        app: edge-agent
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: edge-agent
          image: {{ .Values.modules.edge.image | default "quay.io/redhat-gpte/triforce-edge-agent:latest" }}
          args:
            - --model
            - /models/ggml-model-i2_s.gguf
            - --host
            - "0.0.0.0"
            - --port
            - "8080"
            - --ctx-size
            - "2048"
            - --threads
            - "16"
            - --alias
            - bitnet-2b4t
          ports:
            - containerPort: 8080
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "2"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: edge-agent
  namespace: {{ .Values.namespace }}
  labels:
    app: edge-agent
    app.kubernetes.io/part-of: triforce
spec:
  selector:
    app: edge-agent
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: bitnet-server
  namespace: {{ .Values.namespace }}
  labels:
    app: edge-agent
    app.kubernetes.io/part-of: triforce
spec:
  selector:
    app: edge-agent
  ports:
    - port: 8080
      targetPort: 8080
      name: http
{{- end }}

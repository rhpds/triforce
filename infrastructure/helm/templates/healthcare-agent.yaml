apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthcare-agent
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: healthcare-agent
    app.kubernetes.io/part-of: triforce
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ""
spec:
  replicas: {{ .Values.healthcareAgent.replicas }}
  selector:
    matchLabels:
      app: healthcare-agent
  template:
    metadata:
      labels:
        app: healthcare-agent
        kagenti.io/type: agent
        protocol.kagenti.io/a2a: ""
    spec:
      serviceAccountName: healthcare-agent
      {{- if .Values.confidential.enabled }}
      runtimeClassName: {{ .Values.confidential.runtimeClassName }}
      {{- end }}
      containers:
        - name: agent
          image: {{ .Values.healthcareAgent.image }}
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: LITELLM_API_BASE
              valueFrom:
                secretKeyRef:
                  name: triforce-secrets
                  key: litellm-api-base
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: triforce-secrets
                  key: litellm-api-key
            - name: POSTGRES_HOST
              value: postgres.{{ .Values.namespace }}.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: triforce-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: triforce-secrets
                  key: postgres-password
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: redpanda.{{ .Values.namespace }}.svc.cluster.local:9092
            - name: MCP_GATEWAY_URL
              value: http://mcp-gateway.{{ .Values.namespace }}.svc.cluster.local:8091
            - name: CLASSIFY_MODEL
              value: {{ .Values.healthcareAgent.classifyModel | default "qwen25-3b-cpu" }}
            - name: NER_MODEL
              value: {{ .Values.healthcareAgent.nerModel | default "granite-2b-cpu" }}
            - name: SUMMARIZE_MODEL
              value: {{ .Values.healthcareAgent.summarizeModel | default "qwen25-3b-cpu" }}
            - name: SERVICE_PORT
              value: "8081"
            - name: ADAPTIVE_CLASSIFICATION
              value: "true"
            {{- if .Values.modules.heterogeneous.enabled }}
            - name: HETEROGENEOUS_ROUTING
              value: "true"
            - name: GPU_API_BASE
              value: {{ .Values.modules.heterogeneous.gpuApiBase | quote }}
            - name: GPU_API_KEY
              value: {{ .Values.modules.heterogeneous.gpuApiKey | quote }}
            - name: SEMANTIC_ROUTER_URL
              value: "http://semantic-router.{{ .Values.namespace }}.svc.cluster.local:8094"
            - name: GPU_COMPLEX_MODEL
              value: {{ .Values.modules.heterogeneous.gpuModel | default "granite-4.1-8b" | quote }}
            - name: ROUTING_THRESHOLD
              value: {{ .Values.modules.heterogeneous.routingThreshold | quote }}
            {{- end }}
            {{- if .Values.modules.speculative.enabled }}
            - name: SPECULATIVE_DRAFT_MODEL
              value: {{ .Values.modules.speculative.draftModel | quote }}
            - name: SPECULATIVE_TARGET_MODEL
              value: {{ .Values.modules.speculative.targetModel | quote }}
            - name: SPECULATIVE_MODEL
              value: {{ .Values.modules.speculative.speculativeModel | quote }}
            - name: SPECULATIVE_NUM_TOKENS
              value: {{ .Values.modules.speculative.numSpeculativeTokens | quote }}
            - name: SPECULATIVE_SPEEDUP_CLAIM_THRESHOLD
              value: {{ .Values.modules.speculative.speedupClaimThreshold | quote }}
            {{- end }}
            {{- if .Values.modules.fusion.enabled }}
            - name: FUSION_PANEL_MODELS
              value: {{ .Values.modules.fusion.panelModels | quote }}
            - name: FUSION_JUDGE_MODEL
              value: {{ .Values.modules.fusion.judgeModel | quote }}
            {{- end }}
            - name: MODULES_ENABLED
              value: "{{ if .Values.modules.benchmarking.enabled }}benchmarking,{{ end }}{{ if .Values.modules.speculative.enabled }}speculative,{{ end }}{{ if .Values.modules.heterogeneous.enabled }}heterogeneous,{{ end }}{{ if .Values.modules.fusion.enabled }}fusion,{{ end }}{{ if .Values.modules.edge.enabled }}edge,{{ end }}"
          resources:
            {{- toYaml .Values.healthcareAgent.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: healthcare-agent
  namespace: {{ .Values.namespace }}
---
apiVersion: v1
kind: Service
metadata:
  name: healthcare-agent
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: healthcare-agent
  ports:
    - port: 8081
      targetPort: 8081
      name: http

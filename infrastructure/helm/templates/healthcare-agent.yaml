apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthcare-agent
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: healthcare-agent
    app.kubernetes.io/part-of: triforce
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ""
spec:
  replicas: {{ .Values.healthcareAgent.replicas }}
  selector:
    matchLabels:
      app: healthcare-agent
  template:
    metadata:
      labels:
        app: healthcare-agent
        kagenti.io/type: agent
        protocol.kagenti.io/a2a: ""
    spec:
      serviceAccountName: healthcare-agent
      {{- if .Values.confidential.enabled }}
      runtimeClassName: {{ .Values.confidential.runtimeClassName }}
      {{- end }}
      containers:
        - name: agent
          image: {{ .Values.healthcareAgent.image }}
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: LITELLM_API_BASE
              valueFrom:
                secretKeyRef:
                  name: triforce-secrets
                  key: litellm-api-base
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: triforce-secrets
                  key: litellm-api-key
            - name: POSTGRES_HOST
              value: postgres.{{ .Values.namespace }}.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: triforce-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: triforce-secrets
                  key: postgres-password
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: redpanda.{{ .Values.namespace }}.svc.cluster.local:9092
            - name: MCP_GATEWAY_URL
              value: http://mcp-gateway.{{ .Values.namespace }}.svc.cluster.local:8091
            - name: SERVICE_PORT
              value: "8081"
          resources:
            {{- toYaml .Values.healthcareAgent.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: healthcare-agent
  namespace: {{ .Values.namespace }}
---
apiVersion: v1
kind: Service
metadata:
  name: healthcare-agent
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: healthcare-agent
  ports:
    - port: 8081
      targetPort: 8081
      name: http

namespace: triforce

frontend:
  image: quay.io/redhat-gpte/triforce-frontend:latest

healthcareAgent:
  image: quay.io/redhat-gpte/triforce-healthcare-agent:latest
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

finservAgent:
  image: quay.io/redhat-gpte/triforce-finserv-agent:latest
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

orchestrator:
  image: quay.io/redhat-gpte/triforce-orchestrator:latest
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

postgres:
  enabled: true
  image: docker.io/pgvector/pgvector:pg15
  user: triforce
  database: triforce
  storage: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

kafka:
  enabled: true
  image: docker.io/redpandadata/redpanda:v24.3.1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

mcpGateway:
  enabled: true
  image: quay.io/redhat-gpte/triforce-mcp-gateway:latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

semanticRouter:
  enabled: true
  image: quay.io/redhat-gpte/triforce-semantic-router:latest
  complexModel: qwen25-3b-cpu

litellm:
  apiBase: ""
  apiKey: ""

# ---------------------------------------------------------------
# Pluggable optimization modules — enabled per city/event
# ---------------------------------------------------------------
modules:
  benchmarking:
    enabled: false
  speculative:
    enabled: false
    draftModel: granite-350m
    targetModel: granite-2b-cpu
    speculativeModel: granite-2b-cpu-speculative
    numSpeculativeTokens: 5
    speedupClaimThreshold: 1.5
  heterogeneous:
    enabled: false
    gpuApiBase: ""
    gpuApiKey: ""
    gpuModel: granite-4.1-8b
    routingThreshold: 0.7
  fusion:
    enabled: false
    panelModels: "granite-2b-cpu,qwen25-3b-cpu,phi3-mini-cpu"
    judgeModel: granite-3-2-8b-instruct-cpu
  edge:
    enabled: false
    image: quay.io/redhat-gpte/triforce-edge-agent:latest
    model: bitnet-2b4t
    scadaVm:
      enabled: false
      password: ""
      cores: 2
      memory: 4Gi

# Triforce Secure — Confidential Containers (TDX)
confidential:
  enabled: false
  runtimeClassName: kata-cc

# Triforce Virt — OpenShift Virtualization
virtualization:
  enabled: false
  vm:
    name: legacy-database
    image: registry.redhat.io/rhel9/rhel-guest-image:latest
    password: ""
    cores: 4
    memory: 8Gi

# Triforce Govern — Kagenti Agent Governance
governance:
  enabled: false

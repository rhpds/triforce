namespace: triforce

healthcareAgent:
  image: quay.io/redhat-gpte/triforce-healthcare-agent:latest
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

finservAgent:
  image: quay.io/redhat-gpte/triforce-finserv-agent:latest
  replicas: 2
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 1536Mi

orchestrator:
  image: quay.io/redhat-gpte/triforce-orchestrator:latest
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

postgres:
  enabled: true
  image: docker.io/pgvector/pgvector:pg15
  user: triforce
  database: triforce
  storage: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

kafka:
  enabled: true
  image: docker.io/redpandadata/redpanda:v24.3.1
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi

mcpGateway:
  enabled: true
  image: quay.io/redhat-gpte/triforce-mcp-gateway:latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

litellm:
  apiBase: ""
  apiKey: ""

# Triforce Secure — Confidential Containers (TDX)
confidential:
  enabled: false
  runtimeClassName: kata-cc

# Triforce Virt — OpenShift Virtualization
virtualization:
  enabled: false
  vm:
    name: legacy-database
    image: registry.redhat.io/rhel9/rhel-guest-image:latest
    cores: 4
    memory: 8Gi

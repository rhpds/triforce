---
# llm-d Inference Gateway — routes to warmest KV cache instance
# Requires: Gateway API CRDs + llm-d EPP image
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: triforce-inference-gateway
  namespace: {{ .Values.namespace | default "triforce" }}
spec:
  gatewayClassName: llm-d
  listeners:
    - name: http
      port: 8080
      protocol: HTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: triforce-inference-route
  namespace: {{ .Values.namespace | default "triforce" }}
spec:
  parentRefs:
    - name: triforce-inference-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - name: triforce-vllm-pool
          port: 8000

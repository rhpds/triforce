<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 480" width="520" height="480">
  <defs>
    <filter id="glow-red" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- TOP triangle — Red Hat (Courage) — pointing UP -->
  <polygon points="260,25 165,190 355,190" fill="#EE0000" opacity="0.10"/>
  <polygon points="260,25 165,190 355,190" fill="none" stroke="#EE0000" stroke-width="2.5" filter="url(#glow-red)"/>
  <text x="260" y="95" text-anchor="middle" fill="#EE0000" font-family="Red Hat Display, sans-serif" font-size="12" font-weight="700" letter-spacing="1">RED HAT</text>
  <text x="260" y="115" text-anchor="middle" fill="#EE0000" font-family="Red Hat Display, sans-serif" font-size="16" font-weight="800" letter-spacing="3">COURAGE</text>
  <circle cx="260" cy="148" r="20" fill="none" stroke="#EE0000" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="260" y="152" text-anchor="middle" fill="#EE0000" font-family="Red Hat Mono, monospace" font-size="7" opacity="0.4">LOGO</text>

  <!-- CENTER triangle — inverted (pointing DOWN) — the connector -->
  <polygon points="165,190 355,190 260,355" fill="none" stroke="#383838" stroke-width="1.5" opacity="0.4"/>
  <polygon points="165,190 355,190 260,355" fill="#ffffff" opacity="0.02"/>

  <!-- BOTTOM-LEFT triangle — Intel (Power) — pointing UP -->
  <polygon points="70,355 165,190 260,355" fill="#00AEEF" opacity="0.08"/>
  <polygon points="70,355 165,190 260,355" fill="none" stroke="#00AEEF" stroke-width="2.5" filter="url(#glow-cyan)"/>
  <text x="165" y="265" text-anchor="middle" fill="#00AEEF" font-family="Red Hat Display, sans-serif" font-size="12" font-weight="700" letter-spacing="1">INTEL</text>
  <text x="165" y="285" text-anchor="middle" fill="#00AEEF" font-family="Red Hat Display, sans-serif" font-size="16" font-weight="800" letter-spacing="3">POWER</text>
  <circle cx="165" cy="315" r="20" fill="none" stroke="#00AEEF" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="165" y="319" text-anchor="middle" fill="#00AEEF" font-family="Red Hat Mono, monospace" font-size="7" opacity="0.4">LOGO</text>

  <!-- Title -->
  <text x="260" y="405" text-anchor="middle" fill="#ffffff" font-family="Red Hat Display, sans-serif" font-size="28" font-weight="800" letter-spacing="5">TRIFORCE</text>
  <text x="260" y="430" text-anchor="middle" fill="#a3a3a3" font-family="Red Hat Text, sans-serif" font-size="11" letter-spacing="2">ENTERPRISE AI INFERENCE AT SCALE</text>
</svg>

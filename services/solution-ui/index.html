<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Hat + Intel Solution Architect</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F0F0F0;color:#151515;display:flex;flex-direction:column;height:100vh}
header{background:#151515;color:#FFF;padding:16px 24px;display:flex;align-items:center;gap:12px}
header .brand{font-size:18px;font-weight:600}
header .brand span{color:#EE0000}
#chat{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:780px;width:100%;margin:0 auto;padding:14px 18px;border-radius:8px;font-size:14px;line-height:1.6}
.msg.user{background:#151515;color:#FFF;align-self:flex-end}
.msg.agent{background:#FFF;border:1px solid #DDD}
.msg .ts{font-size:11px;color:#888;margin-bottom:4px}
.msg.agent .ts{color:#999}
details{margin-top:10px;border-top:1px solid #E0E0E0;padding-top:8px}
details summary{cursor:pointer;font-size:13px;font-weight:600;color:#EE0000;user-select:none}
details pre{background:#F5F5F5;padding:10px;border-radius:4px;margin-top:6px;font-size:12px;overflow-x:auto;white-space:pre-wrap;word-break:break-word}
.tool-item{margin:6px 0;padding:8px;background:#F5F5F5;border-radius:4px;font-size:12px}
.tool-item strong{color:#151515}
.error{color:#EE0000;font-weight:600}
#input-area{background:#FFF;border-top:1px solid #DDD;padding:12px 24px;display:flex;gap:8px;align-items:flex-end}
#prompt{flex:1;resize:none;border:1px solid #CCC;border-radius:6px;padding:10px 12px;font-size:14px;font-family:inherit;min-height:44px;max-height:120px;outline:none}
#prompt:focus{border-color:#EE0000}
#send{background:#EE0000;color:#FFF;border:none;border-radius:6px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
#send:hover{background:#CC0000}
#send:disabled{background:#999;cursor:not-allowed}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #DDD;border-top-color:#EE0000;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){header{padding:12px 16px}#chat{padding:12px}#input-area{padding:8px 12px}}
</style>
</head>
<body>
<header>
  <div class="brand"><span>Red Hat</span> + Intel Solution Architect</div>
</header>
<div id="chat"></div>
<div id="input-area">
  <textarea id="prompt" rows="1" placeholder="Describe your workload requirements..."></textarea>
  <button id="send">Send</button>
</div>
<script>
const AGENT_URL = window.AGENT_URL || '';
const chat = document.getElementById('chat');
const prompt = document.getElementById('prompt');
const sendBtn = document.getElementById('send');
let busy = false;

function ts() {
  return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function esc(s) {
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

function addMsg(role, html) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.innerHTML = '<div class="ts">' + ts() + '</div>' + html;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

function renderTools(tools) {
  if (!tools || !tools.length) return '';
  let h = '<details><summary>Tool Calls (' + tools.length + ')</summary>';
  tools.forEach(t => {
    h += '<div class="tool-item"><strong>' + esc(t.tool || t.name || 'unknown') + '</strong>';
    if (t.duration_ms != null) h += ' &mdash; ' + t.duration_ms + 'ms';
    if (t.result != null) h += '<pre>' + esc(typeof t.result === 'string' ? t.result : JSON.stringify(t.result, null, 2)) + '</pre>';
    h += '</div>';
  });
  return h + '</details>';
}

function renderInference(logs) {
  if (!logs || !logs.length) return '';
  let h = '<details><summary>Inference Log (' + logs.length + ')</summary>';
  logs.forEach(l => {
    h += '<div class="tool-item"><strong>' + esc(l.model || 'unknown') + '</strong>';
    if (l.latency_ms != null) h += ' &mdash; ' + l.latency_ms + 'ms';
    if (l.tokens) h += ' &mdash; ' + l.tokens + ' tokens';
    if (l.hardware) h += ' (' + esc(l.hardware) + ')';
    h += '</div>';
  });
  return h + '</details>';
}

async function send() {
  const text = prompt.value.trim();
  if (!text || busy) return;
  busy = true;
  sendBtn.disabled = true;
  prompt.value = '';
  prompt.style.height = 'auto';
  addMsg('user', esc(text));
  const loading = addMsg('agent', '<span class="spinner"></span> Thinking...');

  try {
    const res = await fetch(AGENT_URL + '/api/v1/advise', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({query: text})
    });
    if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + (await res.text()));
    const data = await res.json();
    const brief = data.brief || data.recommendation || data.response || JSON.stringify(data, null, 2);
    let html = '<div>' + esc(brief).replace(/\n/g, '<br>') + '</div>';
    html += renderTools(data.tool_calls || data.tools);
    html += renderInference(data.inference_log || data.inference);
    loading.innerHTML = '<div class="ts">' + ts() + '</div>' + html;
  } catch (e) {
    loading.innerHTML = '<div class="ts">' + ts() + '</div><div class="error">Error: ' + esc(e.message) + '</div>';
  }
  busy = false;
  sendBtn.disabled = false;
  prompt.focus();
}

sendBtn.addEventListener('click', send);
prompt.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
prompt.addEventListener('input', () => {
  prompt.style.height = 'auto';
  prompt.style.height = Math.min(prompt.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>

# Triforce FinServ Agent — Quarkus Configuration

quarkus.http.port=8082

# LiteLLM inference endpoint
litellm.api-base=${LITELLM_API_BASE:https://maas-rhdp.apps.maas.redhatworkshops.io}
litellm.api-key=${LITELLM_API_KEY:}
litellm.classify-model=granite-4-0-h-tiny
litellm.reasoning-model=granite-3-2-8b-instruct

# PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:triforce}
quarkus.datasource.username=${POSTGRES_USER:triforce}
quarkus.datasource.password=${POSTGRES_PASSWORD:dev-only}

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}

mp.messaging.incoming.transactions.connector=smallrye-kafka
mp.messaging.incoming.transactions.topic=finserv.transactions.synthetic
mp.messaging.incoming.transactions.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

mp.messaging.outgoing.fraud-scores.connector=smallrye-kafka
mp.messaging.outgoing.fraud-scores.topic=finserv.fraud.scores
mp.messaging.outgoing.fraud-scores.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.outgoing.compliance-decisions.connector=smallrye-kafka
mp.messaging.outgoing.compliance-decisions.topic=finserv.compliance.decisions
mp.messaging.outgoing.compliance-decisions.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.outgoing.alerts.connector=smallrye-kafka
mp.messaging.outgoing.alerts.topic=finserv.alerts
mp.messaging.outgoing.alerts.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Health
quarkus.smallrye-health.root-path=/health

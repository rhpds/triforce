# Triforce frontend — API proxy + SPA routing
# Loaded by UBI nginx from /opt/app-root/etc/nginx.default.d/

# API proxies — mirror the Vite dev proxy config
location /healthcare/ {
    proxy_pass http://healthcare-agent:8081/;
    proxy_set_header Host $host;
    proxy_read_timeout 120s;
}

location /finserv/ {
    proxy_pass http://finserv-agent:8082/;
    proxy_set_header Host $host;
    proxy_read_timeout 120s;
}

location /orchestrator/ {
    proxy_pass http://orchestrator:8083/;
    proxy_set_header Host $host;
    proxy_read_timeout 120s;
}

location /mcp-gateway/ {
    proxy_pass http://mcp-gateway:8091/;
    proxy_set_header Host $host;
    proxy_read_timeout 30s;
}

location /router/ {
    proxy_pass http://semantic-router:8094/;
    proxy_set_header Host $host;
    proxy_read_timeout 10s;
}

# Lazy DNS — starts even when litellm/edge-agent services are absent
location /litellm/ {
    resolver 172.30.0.10 valid=10s ipv6=off;
    set $litellm_backend "http://litellm:4000";
    rewrite ^/litellm/(.*) /$1 break;
    proxy_pass $litellm_backend;
    proxy_set_header Host $host;
    proxy_read_timeout 120s;
}

location /bitnet/ {
    proxy_pass http://edge-agent:8080/;
    proxy_set_header Host $host;
    proxy_read_timeout 120s;
}

# SPA routing — serve index.html for non-file paths
location / {
    try_files $uri $uri/ /index.html;
}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" width="600" height="520">
  <defs>
    <filter id="glow-red" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!--
    Triforce geometry — 3 equilateral triangles, uniform size
    Side length = 230px, height = 200px
    Top triangle:     apex at (300, 10),  base at y=210
    Bottom-left:      apex at (185, 210), base at y=410
    Bottom-right:     apex at (415, 210), base at y=410
    Center gap:       inverted triangle (negative space)
  -->

  <!-- TOP triangle — Red Hat (Courage) — pointing UP -->
  <polygon points="300,10 185,210 415,210" fill="#EE0000" opacity="0.10"/>
  <polygon points="300,10 185,210 415,210" fill="none" stroke="#EE0000" stroke-width="2" filter="url(#glow-red)"/>
  <image href="logos/redhat.svg" x="240" y="110" width="120" height="28" opacity="0.85"/>
  <text x="300" y="130" text-anchor="middle" fill="#EE0000" font-family="Red Hat Display, sans-serif" font-size="18" font-weight="800" letter-spacing="3">COURAGE</text>
  <text x="300" y="150" text-anchor="middle" fill="#EE0000" font-family="Red Hat Text, sans-serif" font-size="10" opacity="0.6">OpenShift · AMQ Streams · Scale</text>

  <!-- CENTER negative space — inverted triangle -->
  <polygon points="185,210 415,210 300,410" fill="none" stroke="#383838" stroke-width="1" opacity="0.25"/>

  <!-- BOTTOM-LEFT triangle — Intel (Power) — pointing UP -->
  <polygon points="185,210 70,410 300,410" fill="#00AEEF" opacity="0.08"/>
  <polygon points="185,210 70,410 300,410" fill="none" stroke="#00AEEF" stroke-width="2" filter="url(#glow-cyan)"/>
  <image href="logos/intel.png" x="130" y="260" width="110" height="40" opacity="0.85"/>
  <text x="185" y="325" text-anchor="middle" fill="#00AEEF" font-family="Red Hat Display, sans-serif" font-size="18" font-weight="800" letter-spacing="3">POWER</text>
  <text x="185" y="345" text-anchor="middle" fill="#00AEEF" font-family="Red Hat Text, sans-serif" font-size="10" opacity="0.6">Xeon 6 · AMX · $0/token</text>

  <!-- Title -->
  <text x="300" y="458" text-anchor="middle" fill="#ffffff" font-family="Red Hat Display, sans-serif" font-size="32" font-weight="800" letter-spacing="5">TRIFORCE</text>
  <text x="300" y="483" text-anchor="middle" fill="#a3a3a3" font-family="Red Hat Text, sans-serif" font-size="11" letter-spacing="2">ENTERPRISE AI ON CPUS YOU ALREADY OWN</text>
</svg>

name: heterogeneous-routing
displayName: Heterogeneous Compute Routing
description: "Semantic router classifies task complexity and routes to optimal hardware.\
  \ Simple tasks \u2192 CPU ($0/token). Complex tasks \u2192 GPU ($/token). Same API,\
  \ system decides where to spend compute.\n"
audience:
- Platform Architect
- Technical Decision Maker
- SRE
status: live
dependencies:
  maas_models:
    cpu:
    - granite-2b-cpu
    - qwen25-3b-cpu
    gpu:
    - granite-3-2-8b-instruct
    - microsoft-phi-4
    - gpt-oss-20b
helm:
  flag: modules.heterogeneous.enabled
  values:
    heterogeneous:
      enabled: false
      cpuApiBase: ''
      gpuApiBase: ''
      gpuApiKey: ''
      gpuModel: granite-4.1-8b
      routingThreshold: 0.7
showroom:
  content_dir: modules/heterogeneous-routing/content
  nav_entry: '* xref:explore-heterogeneous-routing.adoc[Heterogeneous Routing]'
  lab_page: explore-heterogeneous-routing.adoc
frontend:
  mechanism_group: fleet
  mechanism_num: 10

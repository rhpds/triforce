---
type: showroom

default_width: 35
persist_url_state: true

view_switcher:
  enabled: true
  default_mode: split

tabs:
  # Terminal for oc and curl commands
  - name: Terminal
    path: /wetty
    port: 443

  # Demo Frontend
  - name: Demo
    url: 'https://triforce-${USER}-triforce.${DOMAIN}'

  # Inference Observability Dashboard
  - name: Grafana
    url: 'https://grafana-${USER}-triforce.${DOMAIN}'

  # OpenShift Console
  - name: OCP Console
    url: 'https://console-openshift-console.${DOMAIN}'
